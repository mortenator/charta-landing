<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Purple glow from below -->
    <radialGradient id="glow" cx="50%" cy="100%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#9281F7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9281F7" stop-opacity="0"/>
    </radialGradient>
    <!-- Top highlight -->
    <linearGradient id="top-shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Bar gradient -->
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CBC2FF"/>
      <stop offset="100%" stop-color="#9281F7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0c"/>

  <!-- Purple glow -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- Top edge highlight -->
  <rect x="4" y="0.5" width="24" height="1" rx="0.5" fill="url(#top-shine)"/>

  <!-- Bar chart: 4 ascending bars, last one slightly lower (waterfall feel) -->
  <!-- Bar 1 — shortest -->
  <rect x="4"    y="19" width="4.5" height="9"  rx="1.5" fill="url(#bar)" opacity="0.9"/>
  <!-- Bar 2 -->
  <rect x="10.5" y="14" width="4.5" height="14" rx="1.5" fill="url(#bar)" opacity="0.9"/>
  <!-- Bar 3 — tallest -->
  <rect x="17"   y="8"  width="4.5" height="20" rx="1.5" fill="url(#bar)" opacity="0.95"/>
  <!-- Bar 4 — step down -->
  <rect x="23.5" y="14" width="4.5" height="14" rx="1.5" fill="url(#bar)" opacity="0.65"/>
</svg>
